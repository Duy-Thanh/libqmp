  assemblies:
  - libqmp
  namespace: libqmp.Enums
  summary: >-
    BiosAtaTranslation (Since: 2.0)

    Policy that BIOS should use to interpret cylinder/head/sector addresses. 

    Note that Bochs BIOS and SeaBIOS will not actually translate logical CHS 

    to physical; instead, they will use logical block addressing.
  example: []
  syntax:
    content: 'public enum BiosAtaTranslation : byte'
    content.vb: Public Enum BiosAtaTranslation As Byte
- uid: libqmp.Enums.BiosAtaTranslation.Auto
  commentId: F:libqmp.Enums.BiosAtaTranslation.Auto
  id: Auto
  parent: libqmp.Enums.BiosAtaTranslation
  langs:
  - csharp
  - vb
  name: Auto
  nameWithType: BiosAtaTranslation.Auto
  fullName: libqmp.Enums.BiosAtaTranslation.Auto
  type: Field
  source:
    id: Auto
    path: C:\Users\Nekkochan\source\repos\libqmp\libqmp\Enums\BiosAtaTranslation.cs
    startLine: 24
  assemblies:
  - libqmp
  namespace: libqmp.Enums
  summary: >-
    If cylinder/heads/sizes are passed, choose between none and LBA depending 

    on the size of the disk. If they are not passed, choose none if QEMU can 

    guess that the disk had 16 or fewer heads, large if QEMU can guess that 

    the disk had 131072 or fewer tracks across all heads 

    (i.e. cylinders * heads less than 131072), otherwise LBA.
  example: []
  syntax:
    content: >-
      [JsonPropertyName("auto")]

      Auto = 0
    return:
      type: libqmp.Enums.BiosAtaTranslation
    content.vb: >-
      <JsonPropertyName("auto")>

      Auto = 0
  attributes:
  - type: System.Text.Json.Serialization.JsonPropertyNameAttribute
    ctor: System.Text.Json.Serialization.JsonPropertyNameAttribute.#ctor(System.String)
    arguments:
    - type: System.String
      value: auto
